<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PythonVisual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.js"></script>
  <style>
    :root { --font-scale: 1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", Arial, sans-serif; font-size: calc(16px * var(--font-scale)); background: #f8fafc; color: #1e293b; min-height: 100vh; transition: background 0.2s, color 0.2s; }

    header { background: #ffffff; border-bottom: 1px solid #dbe3ef; padding: 14px 32px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(15,23,42,0.08); }
    header img { height: 52px; width: auto; }
    .header-text h1 { color: #0f172a; font-size: 1.6rem; font-weight: 700; letter-spacing: 0; line-height: 1.1; }
    .header-text p { color: #475569; font-size: 0.82rem; margin-top: 2px; }
    .top-nav { display: flex; align-items: center; gap: 8px; margin-left: 12px; flex-wrap: wrap; }
    .top-nav a { color: #17324d; text-decoration: none; font-size: 0.86rem; font-weight: 700; padding: 7px 10px; border-radius: 7px; border: 1px solid transparent; }
    .top-nav a:hover, .top-nav a.ativo { background: #eef6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .accessibility-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn-access { min-width: 38px; padding: 8px 10px; border: 1.5px solid #cbd5e1; border-radius: 7px; background: #f8fafc; color: #17324d; font-family: "Inter", sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
    .btn-access:hover { background: #e0f2fe; border-color: #2563eb; }
    .btn-access:focus-visible,
    .btn-nav:focus-visible,
    .btn-executar:focus-visible,
    .btn-limpar:focus-visible,
    .btn-entrada:focus-visible,
    .top-nav a:focus-visible,
    .exemplos-row select:focus-visible,
    .entrada-area:focus-visible,
    #slider:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }
    .language-switch { display: inline-flex; gap: 4px; padding: 3px; border: 1.5px solid #cbd5e1; border-radius: 8px; background: #f8fafc; }
    .lang-btn { border: none; border-radius: 6px; padding: 5px 8px; background: transparent; color: #17324d; font-family: "Inter", sans-serif; font-size: 0.78rem; font-weight: 800; cursor: pointer; }
    .lang-btn.active { background: #2563eb; color: white; }

    .main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    .coluna-esquerda, .coluna-direita { display: flex; flex-direction: column; gap: 16px; }

    .card { background: white; border: 1px solid #dbe3ef; border-radius: 8px; box-shadow: 0 1px 4px rgba(15,23,42,0.06); overflow: hidden; }
    .card-header { background: #eef6ff; color: #17324d; border-bottom: 1px solid #dbe3ef; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 16px; }
    .card-header i, .top-nav i, button i, .section-label i, .terminal-label i { margin-right: 6px; }
    .card-body { padding: 16px; }

    .exemplos-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .exemplos-row label { font-weight: 600; font-size: 0.85rem; white-space: nowrap; color: #17324d; }
    .exemplos-row select { flex: 1; padding: 7px 10px; border-radius: 7px; border: 1.5px solid #cbd5e1; font-family: "Inter", sans-serif; font-size: 0.85rem; color: #1e293b; background: #f8fafc; cursor: pointer; outline: none; }
    .exemplos-row select:focus { border-color: #2563eb; }

    .CodeMirror { height: 280px; font-size: calc(14px * var(--font-scale)); border: 1px solid #cbd5e1; border-radius: 8px; font-family: "Fira Mono", "Courier New", monospace; background: #f8fafc; color: #0f172a; }
    .CodeMirror-gutters { background: #eef2f7; border-right: 1px solid #cbd5e1; }
    .CodeMirror-linenumber { color: #64748b; }
    .exec-gutter { width: 30px; }
    .exec-marker { display: flex; align-items: center; justify-content: center; width: 22px; height: 20px; margin-left: 3px; border-radius: 999px; font-size: 0.72rem; font-weight: 800; }
    .exec-marker.proxima { background: #dc2626; color: white; }
    .exec-marker.executada { background: #047857; color: white; }
    .linha-proxima { background: #fee2e2 !important; }
    .linha-executada { background: #dcfce7 !important; }
    .entrada-area { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; outline: none; font-family: "Fira Mono", "Courier New", monospace; font-size: 0.9rem; color: #0f172a; background: #f8fafc; }
    .entrada-area:focus { border-color: #2563eb; background: white; }
    .entrada-linha-info { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; color: #475569; font-size: 0.88rem; }
    .entrada-linha-badge { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; border-radius: 999px; padding: 3px 9px; font-weight: 800; }
    .entrada-form { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: stretch; }
    .btn-entrada { padding: 0 14px; background: #dc2626; color: white; border: none; border-radius: 8px; font-family: "Inter", sans-serif; font-size: 0.86rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
    .btn-entrada:hover { background: #b91c1c; }

    .acoes-codigo { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: stretch; }
    .btn-executar { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-family: "Inter", sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; letter-spacing: 0.02em; }
    .btn-executar:hover { background: #1d4ed8; }
    .btn-executar:active { transform: scale(0.98); }
    .btn-limpar { padding: 0 14px; background: #e2e8f0; color: #17324d; border: 1.5px solid #cbd5e1; border-radius: 8px; font-family: "Inter", sans-serif; font-size: 0.86rem; font-weight: 700; cursor: pointer; transition: background 0.2s, border-color 0.2s; white-space: nowrap; }
    .btn-limpar:hover { background: #dbeafe; border-color: #2563eb; }

    .nav-container { display: flex; flex-direction: column; gap: 10px; }
    .nav-buttons { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-nav { padding: 9px 18px; background: #17324d; color: white; border: none; border-radius: 7px; font-family: "Inter", sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-nav:hover:not(:disabled) { background: #2563eb; }
    .btn-nav:disabled { background: #94a3b8; cursor: not-allowed; }
    .contador { flex: 1; text-align: center; font-weight: 600; font-size: 0.9rem; color: #17324d; background: #f0f6ff; border: 1.5px solid #bfdbfe; border-radius: 7px; padding: 8px; }
    #slider { width: 100%; accent-color: #2563eb; cursor: pointer; }

    .explicacao-linha { display: grid; gap: 10px; }
    .explicacao-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .explicacao-chip { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 9px; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; font-size: 0.76rem; font-weight: 800; }
    .explicacao-codigo { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 10px 12px; font-family: "Fira Mono", "Courier New", monospace; font-size: 0.86rem; }
    .explicacao-texto { color: #334155; font-size: 0.9rem; line-height: 1.45; }

    .memoria-bloco { border: 1px solid #dbe3ef; border-radius: 8px; padding: 12px; background: #f8fafc; }
    .memoria-topo { margin-bottom: 12px; }
    .memoria-subtitulo { color: #64748b; font-size: 0.82rem; margin-top: 2px; }
    .memoria-diagrama { position: relative; }
    .memoria-setas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 4; }
    .memoria-container { position: relative; z-index: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .painel-memoria { min-width: 0; }
    .painel-titulo { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: #475569; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #dbe3ef; }

    .quadro { border: 2px solid #17324d; border-radius: 8px; overflow: hidden; background: white; }
    .quadro-titulo { background: #17324d; color: white; font-weight: 600; font-size: 0.82rem; padding: 5px 12px; }
    .quadro-linhas { display: table; width: 100%; border-collapse: collapse; }
    .quadro-linha { display: table-row; }
    .quadro-linha:not(:last-child) .quadro-cel { border-bottom: 1px solid #e2e8f0; }
    .quadro-cel { display: table-cell; padding: 6px 12px; vertical-align: middle; font-size: 0.85rem; }
    .quadro-cel-nome { font-weight: 600; color: #17324d; white-space: nowrap; padding-right: 16px; }
    .quadro-cel-tipo { width: 1%; white-space: nowrap; padding-left: 0; padding-right: 8px; }
    .tipo-chip { display: inline-block; border-radius: 999px; padding: 2px 8px; background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; font-family: "Inter", sans-serif; font-size: 0.72rem; font-weight: 700; line-height: 1.35; }
    .quadro-cel-valor { font-family: "Fira Mono", "Courier New", monospace; color: #0f172a; }
    .quadro-cel-seta { color: #2563eb; font-weight: bold; font-size: 1rem; }
    .referencia-dot { display: inline-block; width: 9px; height: 9px; border-radius: 999px; background: #0f5f8f; border: 2px solid white; box-shadow: 0 0 0 1px #0f5f8f; vertical-align: middle; }

    .objeto-card { border: 2px solid #059669; border-radius: 8px; overflow: hidden; margin-bottom: 10px; background: white; }
    .objeto-titulo { background: #059669; color: white; font-weight: 600; font-size: 0.78rem; padding: 4px 10px; }
    .objeto-corpo { padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 6px; background: #f0fdf4; }
    .objeto-item { background: white; border: 1px solid #6ee7b7; border-radius: 5px; padding: 3px 8px; font-family: "Fira Mono", "Courier New", monospace; font-size: 0.82rem; text-align: center; }
    .objeto-item-idx { font-size: 0.65rem; color: #6b7280; display: block; }
    .objeto-dict-par { display: flex; align-items: center; gap: 4px; background: white; border: 1px solid #6ee7b7; border-radius: 5px; padding: 3px 8px; font-family: "Fira Mono", "Courier New", monospace; font-size: 0.82rem; }
    .objeto-dict-chave { color: #7c3aed; }
    .lista-card { border: 1.5px solid #cbd5e1; border-radius: 8px; background: white; overflow: hidden; }
    .lista-item { padding: 7px 10px; font-family: "Fira Mono", "Courier New", monospace; font-size: 0.83rem; color: #0f172a; border-bottom: 1px solid #e2e8f0; word-break: break-word; }
    .lista-item:last-child { border-bottom: none; }
    .lista-item strong { color: #17324d; font-family: "Inter", sans-serif; }

    .terminal { border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; background: #ffffff; font-family: "Fira Mono", "Courier New", monospace; }
    .terminal-header { background: #eef2f7; border-bottom: 1px solid #cbd5e1; padding: 7px 12px; display: flex; align-items: center; gap: 6px; }
    .terminal-dot { width: 11px; height: 11px; border-radius: 50%; }
    .terminal-dot.vermelho { background: #ff5f57; }
    .terminal-dot.amarelo  { background: #febc2e; }
    .terminal-dot.verde    { background: #28c840; }
    .terminal-label { margin-left: 6px; font-size: 0.75rem; color: #475569; font-family: "Inter", sans-serif; }
    .terminal-body { padding: 12px 16px; color: #0f172a; background: #f8fafc; font-size: 0.88rem; white-space: pre-wrap; min-height: 52px; max-height: 180px; overflow: auto; }

    .passo-info { font-size: 0.88rem; font-weight: 600; color: #17324d; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid #bfdbfe; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .passo-badge { background: #2563eb; color: white; border-radius: 5px; padding: 2px 8px; font-size: 0.78rem; font-weight: 700; }
    .escopo-badge { background: #e0f2fe; color: #0369a1; border-radius: 5px; padding: 2px 8px; font-size: 0.78rem; font-weight: 600; }
    .linha-badge { border-radius: 5px; padding: 2px 8px; font-size: 0.78rem; font-weight: 700; }
    .linha-badge.executada { background: #dcfce7; color: #14532d; }
    .linha-badge.proxima { background: #fee2e2; color: #991b1b; }
    .pilha-bloco { border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px; background: #f8fbff; margin-bottom: 14px; }
    .pilha-subtitulo { color: #64748b; font-size: 0.82rem; margin: -4px 0 10px; }
    .pilha-lista { display: grid; gap: 8px; }
    .pilha-item { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: flex-start; border: 1px solid #dbeafe; border-radius: 8px; padding: 9px 10px; background: #ffffff; }
    .pilha-item.atual { border-color: #dc2626; background: #fff7f7; }
    .pilha-indice { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 999px; background: #e0f2fe; color: #0369a1; font-size: 0.78rem; font-weight: 900; }
    .pilha-item.atual .pilha-indice { background: #dc2626; color: #ffffff; }
    .pilha-chamada { font-family: "Fira Mono", "Courier New", monospace; color: #0f172a; font-size: 0.86rem; word-break: break-word; }
    .pilha-meta { margin-top: 3px; color: #64748b; font-size: 0.76rem; font-weight: 700; }

    .empty { color: #94a3b8; font-style: italic; font-size: 0.85rem; }
    .error-box { background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 8px; padding: 12px 14px; color: #b91c1c; font-size: 0.88rem; font-weight: 500; }
    .section-label { font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: #475569; margin-bottom: 8px; }
    body.tema-escuro { background: #0f172a; color: #e2e8f0; }
    body.tema-escuro header,
    body.tema-escuro .card,
    body.tema-escuro .quadro,
    body.tema-escuro .objeto-card,
    body.tema-escuro .lista-card,
    body.tema-escuro .terminal { background: #111827; border-color: #334155; box-shadow: none; }
    body.tema-escuro .header-text h1,
    body.tema-escuro .explicacao-texto,
    body.tema-escuro .pilha-chamada,
    body.tema-escuro .quadro-cel-valor,
    body.tema-escuro .lista-item,
    body.tema-escuro .terminal-body { color: #e2e8f0; }
    body.tema-escuro .header-text p,
    body.tema-escuro .top-nav a,
    body.tema-escuro .entrada-linha-info,
    body.tema-escuro .memoria-subtitulo,
    body.tema-escuro .pilha-subtitulo,
    body.tema-escuro .pilha-meta,
    body.tema-escuro .painel-titulo,
    body.tema-escuro .terminal-label,
    body.tema-escuro .section-label { color: #cbd5e1; }
    body.tema-escuro .card-header,
    body.tema-escuro .terminal-header,
    body.tema-escuro .CodeMirror-gutters { background: #1e293b; border-color: #334155; color: #dbeafe; }
    body.tema-escuro .memoria-bloco,
    body.tema-escuro .pilha-bloco,
    body.tema-escuro .objeto-corpo,
    body.tema-escuro .terminal-body,
    body.tema-escuro .contador { background: #0b1120; border-color: #334155; }
    body.tema-escuro .CodeMirror,
    body.tema-escuro .entrada-area,
    body.tema-escuro .exemplos-row select { background: #0b1120; color: #e2e8f0; border-color: #475569; }
    body.tema-escuro .CodeMirror-linenumber { color: #94a3b8; }
    body.tema-escuro .CodeMirror-cursor { border-left-color: #e2e8f0; }
    body.tema-escuro .linha-proxima { background: #7f1d1d !important; }
    body.tema-escuro .linha-executada { background: #14532d !important; }
    body.tema-escuro .quadro-titulo { background: #334155; color: #ffffff; }
    body.tema-escuro .quadro-cel-nome,
    body.tema-escuro .lista-item strong,
    body.tema-escuro .contador { color: #bfdbfe; }
    body.tema-escuro .quadro-linha:not(:last-child) .quadro-cel,
    body.tema-escuro .lista-item { border-color: #334155; }
    body.tema-escuro .objeto-item,
    body.tema-escuro .objeto-dict-par,
    body.tema-escuro .pilha-item { background: #0f172a; border-color: #334155; color: #e2e8f0; }
    body.tema-escuro .pilha-item.atual { background: #2b1116; border-color: #dc2626; }
    body.tema-escuro .tipo-chip { background: #082f49; color: #bae6fd; border-color: #0369a1; }
    body.tema-escuro .explicacao-chip { background: #082f49; color: #bae6fd; border-color: #0369a1; }
    body.tema-escuro .explicacao-codigo { background: #020617; color: #e2e8f0; border: 1px solid #334155; }
    body.tema-escuro .btn-access,
    body.tema-escuro .btn-limpar { background: #1e293b; color: #dbeafe; border-color: #475569; }
    body.tema-escuro .btn-access:hover,
    body.tema-escuro .btn-limpar:hover { background: #334155; border-color: #60a5fa; }
    body.tema-escuro .language-switch { background: #1e293b; border-color: #475569; }
    body.tema-escuro .lang-btn { color: #dbeafe; }
    body.tema-escuro .lang-btn.active { background: #60a5fa; color: #0b1120; }
    body.tema-escuro .entrada-linha-badge { background: #7f1d1d; color: #fecaca; border-color: #991b1b; }
    body.tema-escuro .top-nav a:hover,
    body.tema-escuro .top-nav a.ativo { background: #1e293b; border-color: #475569; color: #bfdbfe; }
    body.tema-escuro .referencia-dot { background: #38bdf8; border-color: #0b1120; box-shadow: 0 0 0 1px #38bdf8; }
    body.tema-escuro .empty { color: #94a3b8; }
    @media (max-width: 900px) {
      .main, .memoria-container { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      header { align-items: flex-start; flex-wrap: wrap; }
      .top-nav { width: 100%; margin-left: 0; }
      .accessibility-controls { width: 100%; justify-content: flex-start; margin-left: 0; }
      .acoes-codigo, .entrada-form { grid-template-columns: 1fr; }
    }
  
/* ===== RESPONSIVIDADE MOBILE ===== */
body { overflow-x: hidden; }

@media (max-width: 1024px) {
  .container, .main, .wrapper {
    flex-direction: column !important;
  }

  .left, .right, .panel, .editor, .memory {
    width: 100% !important;
    max-width: 100% !important;
  }

  .CodeMirror {
    height: 300px !important;
    font-size: 14px !important;
  }

  .nav, .navbar, .topbar {
    flex-wrap: wrap !important;
    gap: 8px !important;
  }

  button {
    padding: 10px 12px !important;
    font-size: 14px !important;
  }

  .memory-container {
    display: flex !important;
    flex-direction: column !important;
  }
}

@media (max-width: 600px) {
  .CodeMirror {
    height: 240px !important;
  }

  .title {
    font-size: 16px !important;
  }

  .card {
    padding: 10px !important;
  }
}

</style>
</head>

	    let currentLang = localStorage.getItem("pythonvisual_lang") || "pt";
	    if (!i18n[currentLang]) currentLang = "pt";

	    function traduzir(chave, valores = {}) {
	      const base = i18n[currentLang] || i18n.pt;
	      let texto = base[chave] || i18n.pt[chave] || chave;
	      for (const [nome, valor] of Object.entries(valores)) {
	        texto = texto.replaceAll("{" + nome + "}", String(valor));
	      }
	      return texto;
	    }

	    function atualizarBotaoTema() {
	      const botao = document.getElementById("btn-tema");
	      const icone = document.getElementById("tema-icone");
	      const label = document.getElementById("tema-label");
	      if (!botao || !icone || !label) return;
	      icone.className = temaEscuro ? "fa-solid fa-sun" : "fa-solid fa-moon";
	      label.textContent = temaEscuro ? traduzir("theme.light") : traduzir("theme.dark");
	    }

	    function aplicarIdioma() {
	      const langAttr = currentLang === "en" ? "en" : "pt-br";
	      document.documentElement.lang = langAttr;
	      document.title = traduzir("title");
	      document.querySelectorAll("[data-i18n]").forEach((el) => {
	        el.textContent = traduzir(el.dataset.i18n);
	      });
	      document.querySelectorAll("[data-i18n-title]").forEach((el) => {
	        const texto = traduzir(el.dataset.i18nTitle);
	        el.title = texto;
	        el.setAttribute("aria-label", texto);
	      });
	      document.querySelectorAll("[data-i18n-aria]").forEach((el) => {
	        el.setAttribute("aria-label", traduzir(el.dataset.i18nAria));
	      });
	      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
	        el.placeholder = traduzir(el.dataset.i18nPlaceholder);
	      });
	      document.querySelectorAll(".lang-btn").forEach((botao) => {
	        const ativo = botao.id === "lang-" + currentLang;
	        botao.classList.toggle("active", ativo);
	        botao.setAttribute("aria-pressed", ativo ? "true" : "false");
	      });
	      atualizarBotaoTema();
	      if (entradaPendente) {
	        document.getElementById("entrada-linha-badge").textContent = traduzir("input.line") + " " + entradaPendente.linha;
	        document.getElementById("entrada-prompt-texto").textContent =
	          entradaPendente.prompt ? traduzir("input.prompt") + ": " + entradaPendente.prompt : traduzir("input.promptDefault");
	      } else {
	        document.getElementById("entrada-prompt-texto").textContent = traduzir("input.promptDefault");
	      }
	      if (passos.length > 0) {
	        renderizarPasso();
	      } else {
	        document.getElementById("contador").textContent = traduzir("counter.empty");
	      }
	    }

	    function setLang(lang) {
	      currentLang = i18n[lang] ? lang : "pt";
	      localStorage.setItem("pythonvisual_lang", currentLang);
	      aplicarIdioma();
	    }

    const exemplos = {
      variaveis:   'x = 10\ny = 5\nprint("Soma:", x + y)\nx = x + y\nprint("Novo x:", x)',

      fatorial:    'def fatorial(n):\n    if n == 0:\n        return 1\n    return n * fatorial(n - 1)\n\nprint(fatorial(5))',
      fibonacci:   'def fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n - 1) + fibonacci(n - 2)\n\nfor i in range(7):\n    print("fib(" + str(i) + ") =", fibonacci(i))',
      lista:       'numeros = [3, 1, 4, 1, 5]\nnumeros.append(9)\nprint("Lista:", numeros)\nprint("Tamanho:", len(numeros))\nprint("Maior:", max(numeros))',

      try_except:  'texto = "10"\ntry:\n    numero = int(texto)\n    print("Numero:", numero)\nexcept ValueError:\n    print("Valor invalido")',
      bubble_sort: 'lista = [5, 3, 8, 1, 2]\nn = len(lista)\nfor i in range(n):\n    for j in range(0, n - i - 1):\n        if lista[j] > lista[j + 1]:\n            lista[j], lista[j + 1] = lista[j + 1], lista[j]\nprint("Ordenada:", lista)'
    };

    function carregarExemplo() {
      const chave = document.getElementById("exemplos").value;
      if (!chave || !exemplos[chave]) return;
      editor.setValue(exemplos[chave]);
      document.getElementById("saida").style.display = "none";
      ocultarEntradaPendente();
      resetarExecucaoVisual();
    }

    function codigoPedeEntrada(codigo) {
      return /(^|[^\w.])input\s*\(/.test(codigo);
    }

    function atualizarEntradaDinamica() {
      if (!entradaPendente) ocultarEntradaPendente();
    }

    function ocultarEntradaPendente() {
      entradaPendente = null;
      document.getElementById("entrada-card").style.display = "none";
      document.getElementById("entrada").value = "";
    }

    function ocultarExplicacaoLinha() {
      document.getElementById("explicacao-card").style.display = "none";
      document.getElementById("explicacao-corpo").innerHTML = "";
    }

	    function mostrarEntradaPendente(passoAtual) {
	      entradaPendente = {
	        linha: passoAtual.linha,
	        prompt: passoAtual.prompt || ""
	      };
	      document.getElementById("entrada-card").style.display = "block";
	      document.getElementById("entrada-linha-badge").textContent = traduzir("input.line") + " " + passoAtual.linha;
	      document.getElementById("entrada-prompt-texto").textContent =
	        entradaPendente.prompt ? traduzir("input.prompt") + ": " + entradaPendente.prompt : traduzir("input.promptDefault");
	      const campoEntrada = document.getElementById("entrada");
	      campoEntrada.value = "";
	      campoEntrada.focus();
    }

    function resetarExecucaoVisual() {
      passos = [];
      indiceAtual = 0;
      entradasColetadas = [];
      ocultarEntradaPendente();
      limparMarcacoes();
      const slider = document.getElementById("slider");
	      slider.max = 0;
	      slider.value = 0;
	      slider.disabled = true;
	      document.getElementById("contador").textContent = traduzir("counter.empty");
	      ocultarExplicacaoLinha();
	      atualizarBotoes();
	    }

    function limparCodigo() {
      editor.setValue("");
      document.getElementById("entrada").value = "";
      document.getElementById("saida").style.display = "none";
      resetarExecucaoVisual();
      editor.focus();
    }

    function aplicarFonte() {
      document.documentElement.style.setProperty("--font-scale", escalaFonte.toFixed(2));
      editor.refresh();
      requestAnimationFrame(desenharSetasMemoria);
    }

    function alterarFonte(delta) {
      escalaFonte = Math.max(0.85, Math.min(1.35, escalaFonte + delta));
      aplicarFonte();
    }

	    function alternarTema() {
	      temaEscuro = !temaEscuro;
	      document.body.classList.toggle("tema-escuro", temaEscuro);
	      atualizarBotaoTema();
	      editor.refresh();
	      requestAnimationFrame(desenharSetasMemoria);
	    }

    function escaparHTML(texto) {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

	    function explicarComandoPython(linha) {
	      const texto = String(linha || "").trim();
	      if (!texto) return traduzir("explain.empty");
	      if (/^#/.test(texto)) return traduzir("explain.comment");
	      if (/^def\s+\w+\s*\(/.test(texto)) return traduzir("explain.def");
	      if (/^class\s+\w+/.test(texto)) return traduzir("explain.class");
	      if (/^return\b/.test(texto)) return traduzir("explain.return");
	      if (/^if\b/.test(texto)) return traduzir("explain.if");
	      if (/^elif\b/.test(texto)) return traduzir("explain.elif");
	      if (/^else\s*:/.test(texto)) return traduzir("explain.else");
	      if (/^for\b/.test(texto)) return traduzir("explain.for");
	      if (/^while\b/.test(texto)) return traduzir("explain.while");
	      if (/^try\s*:/.test(texto)) return traduzir("explain.try");
	      if (/^except\b/.test(texto)) return traduzir("explain.except");
	      if (/^finally\s*:/.test(texto)) return traduzir("explain.finally");
	      if (/^import\b/.test(texto) || /^from\b.+\bimport\b/.test(texto)) return traduzir("explain.import");
	      if (/^print\s*\(/.test(texto)) return traduzir("explain.print");
	      if (/(^|[^\w.])input\s*\(/.test(texto)) return traduzir("explain.input");
	      if (/^break\b/.test(texto)) return traduzir("explain.break");
	      if (/^continue\b/.test(texto)) return traduzir("explain.continue");
	      if (/^pass\b/.test(texto)) return traduzir("explain.pass");
	      if (/^raise\b/.test(texto)) return traduzir("explain.raise");
	      if (/^[A-Za-z_]\w*\.[A-Za-z_]\w*\s*\(/.test(texto)) return traduzir("explain.method");
	      if (/^[A-Za-z_]\w*\s*\(/.test(texto)) return traduzir("explain.call");
	      if (/^[^=<>!]+(\+=|-=|\*=|\/=|\/\/=|%=|\*\*=)/.test(texto)) return traduzir("explain.update");
	      if (/^[^=<>!]+=[^=]/.test(texto)) return traduzir("explain.assign");
	      return traduzir("explain.generic");
	    }

    function alvoExplicacaoLinha() {
	      const proxima = linhaProximaAtual();
	      if (proxima !== null) return { indice: proxima, status: traduzir("status.running") };
	      const executada = linhaExecutadaAtual();
	      if (executada !== null) return { indice: executada, status: traduzir("status.executed") };
	      return null;
	    }

    function atualizarExplicacaoLinha() {
      const card = document.getElementById("explicacao-card");
      const corpo = document.getElementById("explicacao-corpo");
      if (passos.length === 0) {
        ocultarExplicacaoLinha();
        return;
      }

      const alvo = alvoExplicacaoLinha();
	      card.style.display = "block";
	      if (!alvo) {
	        corpo.innerHTML = "<p class=\"explicacao-texto\">" + escaparHTML(traduzir("line.finishedExplain")) + "</p>";
	        return;
	      }

      const linhaCodigo = editor.getLine(alvo.indice) || "";
      corpo.innerHTML =
	        "<div class=\"explicacao-meta\">"
	        + "<span class=\"explicacao-chip\">" + escaparHTML(traduzir("input.line")) + " " + (alvo.indice + 1) + "</span>"
	        + "<span class=\"explicacao-chip\">" + escaparHTML(alvo.status) + "</span>"
	        + "</div>"
	        + "<pre class=\"explicacao-codigo\">" + escaparHTML(linhaCodigo || traduzir("line.empty")) + "</pre>"
	        + "<p class=\"explicacao-texto\">" + escaparHTML(explicarComandoPython(linhaCodigo)) + "</p>";
	    }

    function limparMarcacoes() {
      if (linhaExecutadaMarcada !== null) {
        editor.removeLineClass(linhaExecutadaMarcada, "background", "linha-executada");
        linhaExecutadaMarcada = null;
      }
      if (linhaProximaMarcada !== null) {
        editor.removeLineClass(linhaProximaMarcada, "background", "linha-proxima");
        linhaProximaMarcada = null;
      }
      editor.clearGutter("exec-gutter");
    }

    function criarMarcador(tipo) {
	      const marcador = document.createElement("div");
	      marcador.className = "exec-marker " + tipo;
	      marcador.title = tipo === "proxima" ? traduzir("marker.running") : traduzir("marker.executed");
      marcador.innerHTML = tipo === "proxima"
        ? "<i class=\"fa-solid fa-arrow-right\"></i>"
        : "<i class=\"fa-solid fa-check\"></i>";
      return marcador;
    }

    function renderizarListaSimples(itens, vazio) {
      if (itens.length === 0) return "<p class=\"empty\">" + vazio + "</p>";
      return "<div class=\"lista-card\">" + itens.map(({ nome, info }) => {
        const detalhe = info.modulo ? " <span>(" + escaparHTML(info.modulo) + ")</span>" : "";
        return "<div class=\"lista-item\"><strong>" + escaparHTML(nome) + "</strong>" + detalhe
          + "<br>" + escaparHTML(info.repr || info.nome || info.tipo) + "</div>";
      }).join("") + "</div>";
    }

	    function formatarChamadaPilha(item) {
	      if (!item || item.escopo === "Global") return traduzir("scope.global");
	      const argumentos = Array.isArray(item.argumentos) ? item.argumentos : [];
	      const textoArgumentos = argumentos.map((arg) =>
	        escaparHTML(arg.nome) + "=" + escaparHTML(arg.valor)
      ).join(", ");
      return escaparHTML(item.escopo) + "(" + textoArgumentos + ")";
    }

    function renderizarPilhaChamadas(pilha) {
      if (!Array.isArray(pilha) || pilha.length <= 1) return "";
	      const itens = pilha.map((item, indice) => {
	        const atual = item.atual ? " atual" : "";
	        const marcadorAtual = item.atual ? " - " + traduzir("stack.currentScope") : "";
	        const linha = Number.isInteger(item.linha) ? traduzir("input.line") + " " + item.linha : traduzir("input.line") + " -";
	        return "<div class=\"pilha-item" + atual + "\">"
          + "<div class=\"pilha-indice\">" + (indice + 1) + "</div>"
          + "<div>"
          + "<div class=\"pilha-chamada\">" + formatarChamadaPilha(item) + "</div>"
          + "<div class=\"pilha-meta\">" + linha + marcadorAtual + "</div>"
          + "</div>"
          + "</div>";
      }).join("");

	      return "<div class=\"pilha-bloco\">"
	        + "<div class=\"section-label\"><i class=\"fa-solid fa-layer-group\"></i>" + escaparHTML(traduzir("stack.title")) + "</div>"
	        + "<div class=\"pilha-subtitulo\">" + escaparHTML(traduzir("stack.subtitle")) + "</div>"
	        + "<div class=\"pilha-lista\">" + itens + "</div>"
	        + "</div>";
	    }

	    function renderizarMemoria(variaveis) {
	      if (!variaveis || Object.keys(variaveis).length === 0) {
	        return '<div class="memoria-bloco"><div class="section-label">' + escaparHTML(traduzir("memory.title")) + '</div><p class="empty">' + escaparHTML(traduzir("memory.empty")) + '</p></div>';
	      }
      const primitivos = [];
      const objetos = [];
      const funcoes = [];
      const importacoes = [];
      for (const [nome, info] of Object.entries(variaveis)) {
        if (info.categoria === "primitivo") primitivos.push({ nome, info });
        else if (info.categoria === "objeto") objetos.push({ nome, info });
        else if (info.categoria === "funcao") funcoes.push({ nome, info });
        else if (info.categoria === "importacao") importacoes.push({ nome, info });
        else primitivos.push({ nome, info });
      }

      let linhasQuadro = "";
      for (const { nome, info } of primitivos) {
        linhasQuadro += "<div class=\"quadro-linha\">"
          + "<div class=\"quadro-cel quadro-cel-nome\">" + escaparHTML(nome) + "</div>"
          + "<div class=\"quadro-cel quadro-cel-tipo\"><span class=\"tipo-chip\">" + escaparHTML(info.tipo || "var") + "</span></div>"
          + "<div class=\"quadro-cel quadro-cel-valor\">" + escaparHTML(info.repr) + "</div>"
          + "</div>";
      }
      for (const { nome, info } of objetos) {
        linhasQuadro += "<div class=\"quadro-linha\">"
          + "<div class=\"quadro-cel quadro-cel-nome\">" + escaparHTML(nome) + "</div>"
          + "<div class=\"quadro-cel quadro-cel-tipo\"><span class=\"tipo-chip\">" + escaparHTML(info.tipo || "objeto") + "</span></div>"
	          + "<div class=\"quadro-cel quadro-cel-seta\"><span class=\"referencia-dot\" data-ref-origem=\"" + escaparHTML(nome) + "\" title=\"" + escaparHTML(traduzir("memory.referenceTitle", { name: nome })) + "\"></span></div>"
          + "<div class=\"quadro-cel quadro-cel-valor\" style=\"color:#059669;font-style:italic;\">" + escaparHTML(nome) + "</div>"
          + "</div>";
      }

	      const quadroHTML = "<div class=\"painel-memoria\">"
	        + "<div class=\"painel-titulo\">" + escaparHTML(traduzir("memory.frames")) + "</div>"
	        + "<div class=\"quadro\">"
	        + "<div class=\"quadro-titulo\">" + escaparHTML(traduzir("memory.variables")) + "</div>"
	        + "<div class=\"quadro-linhas\">"
	        + (linhasQuadro || "<div class=\"quadro-linha\"><div class=\"quadro-cel\"><span class=\"empty\">" + escaparHTML(traduzir("memory.emptyShort")) + "</span></div></div>")
	        + "</div></div></div>";

      let objetosHTML = "";
      for (const { nome, info } of objetos) {
        let corpo = "";
        if (info.tipo === "lista" || info.tipo === "tupla") {
          corpo = info.elementos.map((e, i) =>
            "<div class=\"objeto-item\"><span class=\"objeto-item-idx\">" + i + "</span>" + escaparHTML(e) + "</div>"
          ).join("");
        } else if (info.tipo === "conjunto") {
          corpo = info.elementos.map(e =>
            "<div class=\"objeto-item\">" + escaparHTML(e) + "</div>"
          ).join("");
        } else if (info.tipo === "dicionario") {
          corpo = Object.entries(info.pares).map(([k, v]) =>
            "<div class=\"objeto-dict-par\"><span class=\"objeto-dict-chave\">" + escaparHTML(k) + "</span><span>:</span><span>" + escaparHTML(v) + "</span></div>"
          ).join("");
        } else if (info.atributos) {
          corpo = Object.entries(info.atributos).map(([k, v]) =>
            "<div class=\"objeto-dict-par\"><span class=\"objeto-dict-chave\">" + escaparHTML(k) + "</span><span>=</span><span>" + escaparHTML(v) + "</span></div>"
          ).join("");
        }
        if (info.truncado) {
          corpo += "<div class=\"objeto-item\">...</div>";
        }
	        const tipoLabel = { lista:traduzir("type.list"), tupla:traduzir("type.tuple"), conjunto:traduzir("type.set"), dicionario:traduzir("type.dict") }[info.tipo] || info.tipo;
	        objetosHTML += "<div class=\"objeto-card\" data-ref-destino=\"" + escaparHTML(nome) + "\">"
	          + "<div class=\"objeto-titulo\">" + escaparHTML(nome) + " — " + tipoLabel + "</div>"
	          + "<div class=\"objeto-corpo\">" + (corpo || "<span class=\"empty\">" + escaparHTML(traduzir("memory.objectEmpty")) + "</span>") + "</div>"
	          + "</div>";
	      }

	      const painelObjetos = "<div class=\"painel-memoria\">"
	        + "<div class=\"painel-titulo\">" + escaparHTML(traduzir("memory.objects")) + "</div>"
	        + (objetosHTML || "<p class=\"empty\">" + escaparHTML(traduzir("memory.noObjects")) + "</p>")
	        + "</div>";
	      const painelFuncoes = "<div class=\"painel-memoria\">"
	        + "<div class=\"painel-titulo\">" + escaparHTML(traduzir("memory.functions")) + "</div>"
	        + renderizarListaSimples(funcoes, traduzir("memory.noFunctions"))
	        + "</div>";
	      const painelImportacoes = "<div class=\"painel-memoria\">"
	        + "<div class=\"painel-titulo\">" + escaparHTML(traduzir("memory.imports")) + "</div>"
	        + renderizarListaSimples(importacoes, traduzir("memory.noImports"))
	        + "</div>";

	      return "<div class=\"memoria-bloco\">"
	        + "<div class=\"memoria-topo\">"
	        + "<div class=\"section-label\">" + escaparHTML(traduzir("memory.title")) + "</div>"
	        + "<div class=\"memoria-subtitulo\">" + escaparHTML(traduzir("memory.subtitle")) + "</div>"
	        + "</div>"
        + "<div class=\"memoria-diagrama\">"
        + "<svg class=\"memoria-setas\" id=\"memoria-setas\" aria-hidden=\"true\"></svg>"
        + "<div class=\"memoria-container\">" + quadroHTML + painelObjetos + painelFuncoes + painelImportacoes + "</div>"
        + "</div>"
        + "</div>";
    }

    function desenharSetasMemoria() {
      const diagrama = document.querySelector(".memoria-diagrama");
      const svg = document.getElementById("memoria-setas");
      if (!diagrama || !svg) return;

      const area = diagrama.getBoundingClientRect();
      if (area.width === 0 || area.height === 0) return;

      const cor = document.body.classList.contains("tema-escuro") ? "#38bdf8" : "#0f5f8f";
      svg.setAttribute("viewBox", "0 0 " + area.width + " " + area.height);
      svg.setAttribute("width", area.width);
      svg.setAttribute("height", area.height);
      svg.innerHTML = "<defs><marker id=\"memoria-arrowhead\" markerWidth=\"10\" markerHeight=\"8\" refX=\"9\" refY=\"4\" orient=\"auto\" markerUnits=\"strokeWidth\"><path d=\"M0,0 L10,4 L0,8 Z\" fill=\"" + cor + "\"></path></marker></defs>";

      const destinos = Array.from(diagrama.querySelectorAll("[data-ref-destino]"));
      const origens = Array.from(diagrama.querySelectorAll("[data-ref-origem]"));

      for (const origem of origens) {
        const nome = origem.dataset.refOrigem;
        const destino = destinos.find((item) => item.dataset.refDestino === nome);
        if (!destino) continue;

        const origemRect = origem.getBoundingClientRect();
        const destinoRect = destino.getBoundingClientRect();
        const x1 = origemRect.left + origemRect.width / 2 - area.left;
        const y1 = origemRect.top + origemRect.height / 2 - area.top;
        const destinoEstaADireita = destinoRect.left >= origemRect.left;
        const x2 = (destinoEstaADireita ? destinoRect.left : destinoRect.right) - area.left;
        const y2 = destinoRect.top + Math.min(30, destinoRect.height / 2) - area.top;
        const distancia = Math.max(34, Math.abs(x2 - x1) * 0.45);
        const c1x = destinoEstaADireita ? x1 + distancia : x1 - distancia;
        const c2x = destinoEstaADireita ? x2 - distancia : x2 + distancia;

        const caminho = document.createElementNS("http://www.w3.org/2000/svg", "path");
        caminho.setAttribute("d", "M " + x1 + " " + y1 + " C " + c1x + " " + y1 + ", " + c2x + " " + y2 + ", " + x2 + " " + y2);
        caminho.setAttribute("fill", "none");
        caminho.setAttribute("stroke", cor);
        caminho.setAttribute("stroke-width", "2");
        caminho.setAttribute("marker-end", "url(#memoria-arrowhead)");
        svg.appendChild(caminho);
      }
    }

    function entradaPendenteAtual() {
      if (passos.length === 0) return null;
      const ultimo = passos[passos.length - 1];
      return ultimo && ultimo.entrada_pendente ? ultimo : null;
    }

    async function executar() {
      entradasColetadas = [];
      ocultarEntradaPendente();
      await executarComEntradas();
    }

	    async function executarComEntradas() {
	      const codigo = editor.getValue();
	      document.getElementById("saida").style.display = "block";
	      document.getElementById("saida-corpo").innerHTML = "<p class=\"empty\">" + escaparHTML(traduzir("run.executing")) + "</p>";
	      limparMarcacoes();

      try {
        const resp = await fetch("/executar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ codigo, entradas: entradasColetadas })
        });

        if (!resp.ok) {
          const texto = await resp.text();
          throw new Error(texto || resp.statusText);
        }

        passos = await resp.json();
        const pendente = entradaPendenteAtual();
        indiceAtual = pendente ? passos.length - 1 : 0;

	        const slider = document.getElementById("slider");

	        if (passos.length === 0) {
	          document.getElementById("saida-corpo").innerHTML = "<p class=\"empty\">" + escaparHTML(traduzir("run.noSteps")) + "</p>";
	          resetarExecucaoVisual();
	          return;
	        }

        slider.max = passos.length - 1;
        slider.value = indiceAtual;
        slider.disabled = false;
        renderizarPasso();
        if (pendente) mostrarEntradaPendente(pendente);
        else ocultarEntradaPendente();

	      } catch (erro) {
	        resetarExecucaoVisual();
	        document.getElementById("saida-corpo").innerHTML =
	          "<div class=\"error-box\">" + escaparHTML(traduzir("run.serverError", { error: String(erro) })) + "</div>";
	      }
	    }

    async function enviarEntradaPendente() {
      if (!entradaPendente) return;
      const valor = document.getElementById("entrada").value;
      entradasColetadas.push({
        linha: entradaPendente.linha,
        valor
      });
      ocultarEntradaPendente();
      await executarComEntradas();
    }

    function passo(direcao) {
      const novo = indiceAtual + direcao;
      if (novo < 0 || novo >= passos.length) return;
      indiceAtual = novo;
      document.getElementById("slider").value = indiceAtual;
      renderizarPasso();
    }

    function irPara(valor) {
      if (passos.length === 0) return;
      indiceAtual = parseInt(valor);
      renderizarPasso();
    }

    function irParaPrimeiro() {
      if (passos.length === 0) return;
      indiceAtual = 0;
      document.getElementById("slider").value = indiceAtual;
      renderizarPasso();
    }

    function irParaUltimo() {
      if (passos.length === 0) return;
      indiceAtual = passos.length - 1;
      document.getElementById("slider").value = indiceAtual;
      renderizarPasso();
    }

    function atualizarBotoes() {
      const semPassos = passos.length === 0;
      document.getElementById("btn-primeiro").disabled = semPassos || indiceAtual === 0;
      document.getElementById("btn-anterior").disabled = semPassos || indiceAtual === 0;
      document.getElementById("btn-proximo").disabled = semPassos || indiceAtual === passos.length - 1;
      document.getElementById("btn-ultimo").disabled = semPassos || indiceAtual === passos.length - 1;
    }

    function linhaExecutadaAtual() {
      const passoAtual = passos[indiceAtual];
      if (passoAtual && passoAtual.evento === "return" && Number.isInteger(passoAtual.linha)) {
        return passoAtual.linha - 1;
      }
      for (let i = indiceAtual - 1; i >= 0; i--) {
        if (Number.isInteger(passos[i].linha)) return passos[i].linha - 1;
      }
      return null;
    }

    function linhaProximaAtual() {
      const passoAtual = passos[indiceAtual];
      if (passoAtual && (passoAtual.evento === "line" || passoAtual.evento === "input_pendente") && Number.isInteger(passoAtual.linha)) {
        return passoAtual.linha - 1;
      }
      return null;
    }

    function aplicarMarcacoes() {
      limparMarcacoes();
      const executada = linhaExecutadaAtual();
      const proxima = linhaProximaAtual();

      if (executada !== null) {
        linhaExecutadaMarcada = executada;
        editor.addLineClass(executada, "background", "linha-executada");
        editor.setGutterMarker(executada, "exec-gutter", criarMarcador("executada"));
      }
      if (proxima !== null) {
        linhaProximaMarcada = proxima;
        editor.addLineClass(proxima, "background", "linha-proxima");
        editor.setGutterMarker(proxima, "exec-gutter", criarMarcador("proxima"));
      }

      const alvo = proxima !== null ? proxima : executada;
      if (alvo !== null) editor.scrollIntoView({ line: alvo, ch: 0 }, 60);
    }

    function renderizarPasso() {
      if (passos.length === 0) return;
      const p = passos[indiceAtual];
      const corpo = document.getElementById("saida-corpo");
      const linhaExecutada = linhaExecutadaAtual();
      const linhaProxima = linhaProximaAtual();
      const textoExecutada = linhaExecutada === null ? "-" : String(linhaExecutada + 1);
	      const textoProxima = linhaProxima === null ? traduzir("status.finished") : String(linhaProxima + 1);
	      const escopo = p.evento === "fim" ? traduzir("scope.end") : (p.escopo === "Global" ? traduzir("scope.global") : (p.escopo || traduzir("scope.global")));

	      document.getElementById("contador").textContent = traduzir("counter.step", { current: indiceAtual + 1, total: passos.length });
	      atualizarBotoes();
	      aplicarMarcacoes();
	      atualizarExplicacaoLinha();

	      if (p.erro) {
	        corpo.innerHTML = "<div class=\"error-box\"><strong>" + escaparHTML(traduzir("error.label")) + "</strong> " + escaparHTML(p.erro) + "</div>"
	          + "<div class=\"section-label\" style=\"margin-top:14px;\">" + escaparHTML(traduzir("output.errorUntil")) + "</div>"
	          + "<div class=\"terminal\">"
	          + "<div class=\"terminal-header\">"
	          + "<div class=\"terminal-dot vermelho\"></div>"
	          + "<div class=\"terminal-dot amarelo\"></div>"
	          + "<div class=\"terminal-dot verde\"></div>"
	          + "<span class=\"terminal-label\">" + escaparHTML(traduzir("output.label")) + "</span></div>"
	          + "<div class=\"terminal-body\">" + (p.saida && p.saida.trim() ? escaparHTML(p.saida) : "<span class=\"empty\">" + escaparHTML(traduzir("output.none")) + "</span>") + "</div></div>";
	        return;
	      }

	      const saidaConteudo = p.saida && p.saida.trim()
	        ? escaparHTML(p.saida)
	        : "<span class=\"empty\">" + escaparHTML(traduzir("output.noPrint")) + "</span>";
	      const etapaTexto = p.evento === "fim" ? traduzir("state.finished") : (p.evento === "input_pendente" ? traduzir("state.waitingInput") : (p.evento === "return" ? traduzir("state.return") : traduzir("state.running")));

	      corpo.innerHTML =
	        "<div class=\"passo-info\">"
	        + "<span class=\"passo-badge\">" + escaparHTML(traduzir("counter.step", { current: indiceAtual + 1, total: passos.length })) + "</span>"
	        + escaparHTML(etapaTexto)
	        + "<span class=\"linha-badge executada\"><i class=\"fa-solid fa-check\"></i>" + escaparHTML(traduzir("status.executed")) + ": " + textoExecutada + "</span>"
	        + "<span class=\"linha-badge proxima\"><i class=\"fa-solid fa-arrow-right\"></i>" + escaparHTML(traduzir("status.running")) + ": " + textoProxima + "</span>"
	        + "<span class=\"escopo-badge\">" + escaparHTML(escopo) + "</span>"
	        + "</div>"
	        + renderizarPilhaChamadas(p.pilha_chamadas)
	        + renderizarMemoria(p.variaveis)
	        + "<div class=\"section-label\" style=\"margin-top:16px;\"><i class=\"fa-solid fa-square-terminal\"></i>" + escaparHTML(traduzir("output.section")) + "</div>"
	        + "<div class=\"terminal\">"
	        + "<div class=\"terminal-header\">"
	        + "<div class=\"terminal-dot vermelho\"></div>"
	        + "<div class=\"terminal-dot amarelo\"></div>"
	        + "<div class=\"terminal-dot verde\"></div>"
	        + "<span class=\"terminal-label\"><i class=\"fa-solid fa-terminal\"></i>" + escaparHTML(traduzir("output.label")) + "</span></div>"
	        + "<div class=\"terminal-body\">" + saidaConteudo + "</div></div>";
      requestAnimationFrame(desenharSetasMemoria);
    }

    editor.on("change", () => {
      entradasColetadas = [];
      ocultarEntradaPendente();
      ocultarExplicacaoLinha();
    });
	    document.getElementById("entrada").addEventListener("keydown", (evento) => {
	      if (evento.key === "Enter") {
	        evento.preventDefault();
	        enviarEntradaPendente();
	      }
	    });

	    function focoEmCampoDeTexto(evento) {
	      const alvo = evento.target;
	      if (!alvo) return false;
	      if (alvo.closest && alvo.closest(".CodeMirror")) return true;
	      if (alvo.isContentEditable) return true;
	      return ["INPUT", "TEXTAREA", "SELECT"].includes(alvo.tagName);
	    }

	    function alvoAtivavel(alvo) {
	      return !!(alvo && alvo.closest && alvo.closest("button, a"));
	    }

	    document.addEventListener("keydown", (evento) => {
	      const tecla = evento.key;

	      if ((evento.ctrlKey || evento.metaKey) && tecla === "Enter") {
	        evento.preventDefault();
	        executar();
	        return;
	      }

	      if (tecla === "Escape") {
	        evento.preventDefault();
	        editor.focus();
	        return;
	      }

	      if (focoEmCampoDeTexto(evento) || evento.altKey || evento.ctrlKey || evento.metaKey) return;
	      if (tecla === " " && alvoAtivavel(evento.target)) return;

	      if (tecla === "ArrowRight" || tecla === " ") {
	        evento.preventDefault();
	        passo(1);
	        return;
	      }
	      if (tecla === "ArrowLeft") {
	        evento.preventDefault();
	        passo(-1);
	        return;
	      }
	      if (tecla === "Home") {
	        evento.preventDefault();
	        irParaPrimeiro();
	        return;
	      }
	      if (tecla === "End") {
	        evento.preventDefault();
	        irParaUltimo();
	        return;
	      }
	      if (tecla.toLowerCase() === "r") {
	        evento.preventDefault();
	        executar();
	        return;
	      }
	      if (tecla.toLowerCase() === "c") {
	        evento.preventDefault();
	        limparCodigo();
	      }
	    });

	    window.addEventListener("resize", desenharSetasMemoria);
	    resetarExecucaoVisual();
	    aplicarIdioma();
	    atualizarEntradaDinamica();
	  </script>

	</body>
</html>
